<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#7b61ff"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <linearGradient id="node1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#44a08d"/>
    </linearGradient>
    <linearGradient id="node2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a24"/>
    </linearGradient>
    <linearGradient id="node3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#6c5ce7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.3"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.15"/>

  <!-- Connection lines (behind nodes) -->
  <line x1="256" y1="256" x2="160" y2="160" stroke="#4ecdc4" stroke-width="4" opacity="0.5" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="352" y2="160" stroke="#ff6b6b" stroke-width="4" opacity="0.5" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="160" y2="352" stroke="#a29bfe" stroke-width="4" opacity="0.5" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="352" y2="352" stroke="#ffd93d" stroke-width="4" opacity="0.5" stroke-linecap="round"/>

  <!-- Center hub -->
  <circle cx="256" cy="256" r="48" fill="#1a1a2e" stroke="url(#ring)" stroke-width="4" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="20" fill="url(#ring)" opacity="0.9"/>

  <!-- Port nodes -->
  <circle cx="160" cy="160" r="28" fill="url(#node1)" filter="url(#glow)"/>
  <text x="160" y="165" text-anchor="middle" fill="white" font-family="monospace" font-size="18" font-weight="bold">80</text>

  <circle cx="352" cy="160" r="28" fill="url(#node2)" filter="url(#glow)"/>
  <text x="352" y="165" text-anchor="middle" fill="white" font-family="monospace" font-size="18" font-weight="bold">443</text>

  <circle cx="160" cy="352" r="28" fill="url(#node3)" filter="url(#glow)"/>
  <text x="160" y="357" text-anchor="middle" fill="white" font-family="monospace" font-size="16" font-weight="bold">3000</text>

  <circle cx="352" cy="352" r="28" fill="#ffd93d" filter="url(#glow)"/>
  <text x="352" y="357" text-anchor="middle" fill="#1a1a2e" font-family="monospace" font-size="16" font-weight="bold">5432</text>

  <!-- Small orbiting dots -->
  <circle cx="256" cy="96" r="8" fill="#00d4ff" opacity="0.7"/>
  <circle cx="416" cy="256" r="8" fill="#7b61ff" opacity="0.7"/>
  <circle cx="256" cy="416" r="8" fill="#4ecdc4" opacity="0.7"/>
  <circle cx="96" cy="256" r="8" fill="#ff6b6b" opacity="0.7"/>
</svg>

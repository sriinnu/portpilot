name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build
        run: swift build -c release

      - name: Create Artifacts
        run: |
          mkdir -p artifacts
          cp .build/release/portpilot artifacts/portpilot-macos

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portpilot-macos
          path: artifacts/*

  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build
        run: swift build -c release

      - name: Create Artifacts
        run: |
          mkdir -p artifacts
          cp .build/release/portpilot artifacts/portpilot-linux

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portpilot-ubuntu
          path: artifacts/*

  release:
    needs: [build-macos, build-ubuntu]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/portpilot-macos/portpilot-macos
            artifacts/portpilot-ubuntu/portpilot-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build and Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build CLI
        run: swift build -c release

      - name: Build macOS app
        run: xcodebuild -project PortPilot.xcodeproj -target PortPilot -configuration Release SYMROOT=.build/xcode build

      - name: Package macOS artifacts
        run: |
          mkdir -p artifacts
          cp .build/release/portpilot artifacts/portpilot-macos-cli
          ditto -c -k --sequesterRsrc --keepParent .build/xcode/Release/PortPilot.app artifacts/PortPilot-macOS-app.zip

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portpilot-macos
          path: artifacts/*

  release:
    needs: [build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          sha256sum portpilot-macos/PortPilot-macOS-app.zip > SHA256SUMS.txt
          sha256sum portpilot-macos/portpilot-macos-cli >> SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/portpilot-macos/PortPilot-macOS-app.zip
            artifacts/portpilot-macos/portpilot-macos-cli
            artifacts/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
